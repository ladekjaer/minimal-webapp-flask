services:
  app:
    build: .
    environment:
      DATABASE_URL: postgres://webapp_user:webapp_password@database:5432/webapp_db
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: webapp_user
      POSTGRES_PASSWORD: webapp_password
      POSTGRES_DB: webapp_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "webapp_user", "-d", "webapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
